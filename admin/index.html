<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Samuell Daaas</title>
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <div class="login-logo">
        <svg viewBox="0 0 120 60" width="72" height="36" fill="none">
          <text x="0" y="50" font-family="'Montserrat',sans-serif" font-weight="900" font-size="56" fill="#274690" letter-spacing="-2">SD</text>
        </svg>
      </div>
      <h2 class="login-title">Painel Admin</h2>
      <p class="login-desc">Digite a senha para acessar</p>
      <input class="login-input" id="login-pass" type="password" placeholder="Senha" autofocus>
      <div class="login-error" id="login-error"></div>
      <button class="login-btn" id="login-btn">Entrar</button>
    </div>
  </div>

  
  <div class="admin-wrap" id="admin-wrap" style="display:none">
    <div class="topbar">
      <a href="../index.html" class="topbar-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
        Ver Site
      </a>
      <span class="topbar-title">PAINEL ADMIN</span>
      <div class="save-area">
        <span class="saved-msg" id="saved"></span>
        <button class="save-btn" id="btn-save">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Salvar
        </button>
      </div>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab-btn on" data-t="destaque">Imagem de Destaque</button>
      <button class="tab-btn" data-t="faixas">Faixas</button>
      <button class="tab-btn" data-t="videos">Vídeos</button>
      <button class="tab-btn" data-t="agenda">Agenda</button>
      <button class="tab-btn" data-t="galeria">Galeria</button>
      <button class="tab-btn" data-t="sobre">Sobre Mim</button>
      <button class="tab-btn" data-t="links">Links / Contato</button>
      <button class="tab-btn" data-t="config">⚙ Config</button>
    </div>

    <div class="content" id="content">
      <div class="panel on" id="p-destaque"></div>
      <div class="panel" id="p-faixas"></div>
      <div class="panel" id="p-videos"></div>
      <div class="panel" id="p-agenda"></div>
      <div class="panel" id="p-galeria"></div>
      <div class="panel" id="p-sobre"></div>
      <div class="panel" id="p-links"></div>
      <div class="panel" id="p-config"></div>
    </div>

    <div id="modal-root"></div>
  </div>

  <script src="../js/admin.js"></script>
</body>
</html>
